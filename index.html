<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASIC WRITING</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=7">
</head>
<body>

    <div id="login-modal" class="login-overlay" style="display: none;">
        <div class="modal-content login-modal">
            <h2 style="color: var(--primary-color); margin-bottom: 24px; font-size: 1.8rem; text-align: center;">NHẬP THÔNG TIN<br>ĐỂ BẮT ĐẦU HỌC 🚀</h2>
            <div class="form-group">
                <label for="student-name">Họ và Tên</label>
                <input type="text" id="student-name" placeholder="Ví dụ: Nguyễn Văn A">
            </div>
            <div class="form-group" style="margin-bottom: 32px;">
                <label for="student-class">Lớp</label>
                <input type="text" id="student-class" placeholder="Ví dụ: 10A1">
            </div>
            <button class="btn-primary" style="width: 100%; font-size: 1.2rem; padding: 14px; border-radius: 12px; border: none;" onclick="saveStudentInfo()">BẮT ĐẦU HỌC</button>
        </div>
    </div>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="https://www.facebook.com/anhnguRiverCT" target="_blank" class="galaxy-text">RIVER ENGLISH CENTER</a>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Nav items generated by JS -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg>
                    <a href="https://www.facebook.com/nguyetpham28" target="_blank" class="galaxy-text" style="font-size: inherit; margin-left: 6px;">ENGLISH WITH MISS NGUYET</a>
                </div>
                <div style="display: flex; gap: 16px; align-items: center;">
                    <button onclick="saveProgress()" style="padding: 8px 16px; border-radius: 20px; font-weight: bold; background: var(--bg-card); color: var(--primary-color); border: 2px solid var(--primary-color); cursor: pointer; transition: all 0.3s;" onmouseover="this.style.background='var(--primary-color)'; this.style.color='white'" onmouseout="this.style.background='var(--bg-card)'; this.style.color='var(--primary-color)'">💾 LƯU TIẾN ĐỘ</button>
                    <button onclick="clearProgress()" style="padding: 8px 16px; border-radius: 20px; font-weight: bold; background: var(--bg-card); color: #ef4444; border: 2px solid #ef4444; cursor: pointer; transition: all 0.3s;" onmouseover="this.style.background='#ef4444'; this.style.color='white'" onmouseout="this.style.background='var(--bg-card)'; this.style.color='#ef4444'">🗑 XÓA LỊCH SỬ</button>
                    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Chuyển chế độ Sáng/Tối">
                        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    </button>
                </div>
            </header>

            <div class="content-wrapper" id="content-wrapper">
                <!-- Content injected here via JS -->
            </div>
        </main>
    </div>

    <!-- Modal for Detailed Lesson -->
    <div class="modal-overlay" id="lesson-modal">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-title-wrap">
                    <span class="modal-icon" id="modal-icon">📚</span>
                    <h2 class="modal-title" id="modal-title">Tiêu đề bài học</h2>
                </div>
                <button class="modal-close" onclick="closeModal()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <!-- Notification overlay for locked content -->
    <div id="locked-notification" class="notification">
        <span>Bài học này chưa được mở khóa.</span>
    </div>

    <script src="script.js?v=32"></script>
</body>
</html>
